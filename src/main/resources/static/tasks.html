<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker - Tasks</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <h1>Task Tracker</h1>
    <div>
        <span style="color:white" id="welcomeMsg"></span>
        <a href="projects.html">Projektet</a>
        <button onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container" style="margin-top:20px">

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <div>
            <a href="projects.html" style="color:#3498db">← Kthehu</a>
            <h2 id="projectTitle" style="display:inline; margin-left:15px"></h2>
        </div>
        <button class="btn btn-primary" id="addTaskBtn" onclick="openModal()" style="display:none">
            + Task i Ri
        </button>
    </div>

    <div class="filter-bar">
        <input type="text" id="searchTitle" placeholder="Kërko sipas titullit..." oninput="filterTasks()">
        <select id="filterStatus" onchange="filterTasks()">
            <option value="">Të gjitha statuset</option>
            <option value="TODO">TODO</option>
            <option value="IN_PROGRESS">IN PROGRESS</option>
            <option value="COMPLETED">COMPLETED</option>
        </select>
        <select id="filterPriority" onchange="filterTasks()">
            <option value="">Të gjitha prioritetet</option>
            <option value="HIGH">HIGH</option>
            <option value="MEDIUM">MEDIUM</option>
            <option value="LOW">LOW</option>
        </select>
    </div>

    <!-- ALERT -->
    <div id="alert" class="alert" style="display:none"></div>

    <div class="grid" id="tasksList"></div>

</div>
<!-- MODAL — Krijo/Edito Task -->
<div class="modal" id="taskModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Krijo Task të Ri</h3>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>

        <!-- Fushat e plota — vetëm për owner -->
        <div id="fullEditFields">
            <div class="form-group">
                <label>Titulli</label>
                <input type="text" id="taskTitle" placeholder="Min 3, Max 100 karaktere">
            </div>
            <div class="form-group">
                <label>Pershkrimi</label>
                <textarea id="taskDesc" rows="3"></textarea>
            </div>
        </div>

        <!-- Statusi — të gjithë -->
        <div class="form-group">
            <label>Statusi</label>
            <select id="taskStatus">
                <option value="TODO">TODO</option>
                <option value="IN_PROGRESS">IN PROGRESS</option>
                <option value="COMPLETED">COMPLETED</option>
            </select>
        </div>

        <!-- Fushat e tjera — vetëm për owner -->
        <div id="ownerOnlyFields">
            <div class="form-group">
                <label>Prioriteti</label>
                <select id="taskPriority">
                    <option value="HIGH">HIGH</option>
                    <option value="MEDIUM">MEDIUM</option>
                    <option value="LOW">LOW</option>
                </select>
            </div>
            <div class="form-group">
                <label>Data e skadimit</label>
                <input type="date" id="taskDueDate">
            </div>
            <div class="form-group">
                <label>Cakto te (Assignee)</label>
                <select id="taskAssignee">
                    <option value="">Pa assignee</option>
                </select>
            </div>
        </div>

        <button class="btn btn-success" style="width:100%" onclick="saveTask()">Ruaj</button>
    </div>

    </div>
<div class="modal" id="activityModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>📋 Historia e Ndryshimeve</h3>
            <button class="modal-close" onclick="closeActivityModal()">✕</button>
        </div>
        <div id="activityList"></div>
    </div>
</div>

<script src="js/tasks.js"></script>
</body>
</html>
