<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker - Projektet</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <h1>Task Tracker</h1>
    <div>
        <span style="color:white" id="welcomeMsg"></span>
        <a href="projects.html">Projektet</a>
        <button onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container" style="margin-top:20px">

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h2>Projektet</h2>
        <button class="btn btn-primary" onclick="openModal()">+ Projekt i Ri</button>
    </div>

    <div id="alert" class="alert" style="display:none"></div>

    <div class="grid" id="projectsList"></div>

</div>

<div class="modal" id="projectModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Krijo Projekt të Ri</h3>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="form-group">
            <label>Emri</label>
            <input type="text" id="projectName" placeholder="Min 3, Max 50 karaktere">
        </div>
        <div class="form-group">
            <label>Pershkrimi</label>
            <textarea id="projectDesc" rows="3" placeholder="Pershkrimi i projektit"></textarea>
        </div>
        <button class="btn btn-success" style="width:100%" onclick="createProject()">Krijo</button>
    </div>
</div>

<script src="js/projects.js"></script>
</body>
</html>
